<!DOCTYPE html>
<!-- Product Detail page -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Producto — NOIR</title>
    <meta name="description" id="page-description" content="Detalle de producto NOIR. Seleccioná tu talle y agregalo al carrito.">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav aria-label="Navegación principal">
            <div class="logo">
                <a href="../index.html" aria-label="Ir al inicio de NOIR">
                    <img src="../img/logo.png" alt="Logo de NOIR — Moda contemporánea">
                </a>
            </div>
            <button class="hamburger" aria-label="Abrir menú de navegación" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" role="list">
                <li><a href="products.html">Productos</a></li>
                <li><a href="lookbook.html">Lookbook</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon" title="Mi carrito" role="button" aria-label="Ver carrito de compras">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count" aria-label="Cantidad de artículos en el carrito"></span>
            </div>
        </nav>
    </header>

    <main id="contenido-principal">

        <!-- ===== PRODUCT DETAIL ===== -->
        <section class="product-detail" aria-labelledby="product-name">

            <div class="product-detail-container">

                <!-- Imagen del producto -->
                <div class="product-image-container">
                    <img id="product-image" class="product-image" src="" alt=""
                         aria-describedby="product-name">
                </div>

                <!-- Información del producto -->
                <article class="product-info">
                    <h1 id="product-name" class="product-name"></h1>
                    <p id="product-price" class="product-price" aria-label="Precio del producto"></p>

                    <div class="size-selection">
                        <h2>Seleccioná tu talle:</h2>
                        <div id="size-options" class="size-options" role="group"
                             aria-label="Opciones de talle disponibles">
                            <!-- Generado por JavaScript -->
                        </div>
                    </div>

                    <button id="add-to-cart-btn" class="add-to-cart"
                            aria-label="Agregar producto al carrito">
                        Agregar al carrito
                    </button>
                </article>

            </div>
        </section>

        <!-- ===== NEWSLETTER ===== -->
        <section class="newsletter" aria-labelledby="newsletter-detail-title">
            <article>
                <h2 id="newsletter-detail-title">Suscríbete a Nuestro Newsletter</h2>
                <p>Recibe las últimas tendencias y ofertas exclusivas</p>
                <form class="newsletter-form" id="newsletter-form-detail" novalidate>
                    <label for="newsletter-email-detail" class="visually-hidden">Tu correo electrónico</label>
                    <input type="email" id="newsletter-email-detail" name="email"
                           placeholder="Tu correo electrónico" required>
                    <button type="submit">Suscribirse</button>
                </form>
            </article>
        </section>

    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="../js/cart.js"></script>
    <script>
        // Datos de productos
        const products = {
            'Remera Blanca':  { price: 45000,  image: '../img/remera blanca.png',  sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Remera Negra':   { price: 45000,  image: '../img/remera negra.png',   sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Jean':           { price: 129000, image: '../img/jean.png',           sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Jean Ripped':    { price: 149000, image: '../img/jean ripped.png',    sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Buzo Blanco':    { price: 70000,  image: '../img/buzo blanco.png',    sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Buzo Negro':     { price: 70000,  image: '../img/buzo negro.png',     sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Gorra Negra':    { price: 35000,  image: '../img/gorra negra.png',    sizes: ['S', 'M', 'L'] },
            'Gorra Blanca':   { price: 35000,  image: '../img/gorra blanca.png',   sizes: ['S', 'M', 'L'] }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name');

        if (productName && products[productName]) {
            const product = products[productName];

            // Actualizar SEO dinámicamente
            document.getElementById('page-title').textContent = productName + ' — NOIR';
            document.getElementById('page-description').setAttribute('content',
                'Comprá ' + productName + ' en NOIR. Diseño contemporáneo, calidad premium. Precio: $' + product.price.toLocaleString() + '. Seleccioná tu talle y agregalo al carrito.');

            // Datos del producto
            document.getElementById('product-name').textContent = productName;
            document.getElementById('product-price').textContent = '$' + product.price.toLocaleString();
            const imgEl = document.getElementById('product-image');
            imgEl.src = product.image;
            imgEl.alt = productName + ' — NOIR. Prenda de diseño contemporáneo.';

            // Talles
            let selectedSize = null;
            const sizeOptions = document.getElementById('size-options');

            product.sizes.forEach(size => {
                const sizeBtn = document.createElement('button');
                sizeBtn.textContent = size;
                sizeBtn.className = 'size-btn';
                sizeBtn.setAttribute('aria-label', 'Talle ' + size);
                sizeBtn.addEventListener('click', () => {
                    document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
                    sizeBtn.classList.add('selected');
                    selectedSize = size;
                });
                sizeOptions.appendChild(sizeBtn);
            });

            // Agregar al carrito
            document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                if (!selectedSize) {
                    alert('Por favor seleccioná un talle.');
                    return;
                }
                cart.addProduct({
                    id: slugify(productName + '-' + selectedSize),
                    name: productName + ' (' + selectedSize + ')',
                    price: product.price,
                    size: selectedSize
                });
            });

        } else {
            document.querySelector('.product-detail').innerHTML =
                '<p style="text-align:center;padding:3rem;">Producto no encontrado. <a href="products.html">Ver todos los productos</a></p>';
        }

        // Newsletter
        document.getElementById('newsletter-form-detail').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('¡Gracias por suscribirte!');
            e.target.reset();
        });

        // Hamburger
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', function () {
            const isOpen = navLinks.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', isOpen);
        });
    </script>

</body>

</html>
