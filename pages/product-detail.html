<!DOCTYPE html>
<!-- Product Detail page -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo"><a href="../index.html" style="text-decoration: none; color: inherit;"><img
                        src="../img/logo.png" alt="NOIR Logo" style="height: 55px; width: auto;"></a></div>
            <button class="hamburger" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="products.html">Productos</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon" title="Mi carrito">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count"></span>
            </div>
        </nav>
    </header>

    <!-- Product detail section -->
    <section class="product-detail" style="padding-top: 140px; margin-top: 0; padding-right: 2rem; padding-bottom: 2rem; padding-left: 2rem;">
        <div class="product-detail-container" style="max-width: 800px; margin: 0 auto; display: flex; gap: 2rem; flex-wrap: wrap;">
            <div class="product-image-container" style="flex: 1; min-width: 300px;">
                <img id="product-image" class="product-image" src="" alt="" style="width: 100%; height: auto; max-height: 500px; object-fit: cover;">
            </div>
            <div class="product-info" style="flex: 1; min-width: 300px;">
                <h1 id="product-name" class="product-name"></h1>
                <p id="product-price" class="product-price" style="font-size: 1.5rem; font-weight: bold; margin: 1rem 0;"></p>
                
                <div class="size-selection" style="margin: 2rem 0;">
                    <h3>Selecciona tu talle:</h3>
                    <div id="size-options" class="size-options" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                        <!-- Sizes will be populated by JavaScript -->
                    </div>
                </div>
                
                <button id="add-to-cart-btn" class="add-to-cart" style="width: 100%; padding: 1rem; background: #000; color: #fff; border: none; cursor: pointer; font-weight: 600; margin-top: 2rem;">Agregar al carrito</button>
            </div>
        </div>
    </section>

    <!-- Newsletter section -->
    <section class="newsletter">
        <h2>Suscríbete a Nuestro Newsletter</h2>
        <p style="margin-bottom: 1.5rem;">Recibe las últimas tendencias y ofertas exclusivas</p>
        <form class="newsletter-form">
            <input type="email" placeholder="Tu correo electrónico" required>
            <button type="submit">Suscribirse</button>
        </form>
    </section>

    <script src="../js/cart.js"></script>
    <script>
        // Product data
        const products = {
            'Remera Blanca': { price: 45000, image: '../img/remera blanca.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Remera Negra': { price: 45000, image: '../img/remera negra.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Jean': { price: 129000, image: '../img/jean.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Jean Ripped': { price: 149000, image: '../img/jean ripped.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Buzo Blanco': { price: 70000, image: '../img/buzo blanco.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Buzo Negro': { price: 70000, image: '../img/buzo negro.png', sizes: ['XS', 'S', 'M', 'L', 'XL', 'XXL'] },
            'Gorra Negra': { price: 35000, image: '../img/gorra negra.png', sizes: ['S', 'M', 'L'] },
            'Gorra Blanca': { price: 35000, image: '../img/gorra blanca.png', sizes: ['S', 'M', 'L'] }
        };

        // Get product name from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name');

        if (productName && products[productName]) {
            const product = products[productName];
            
            // Set product details
            document.getElementById('product-name').textContent = productName;
            document.getElementById('product-price').textContent = '$' + product.price.toLocaleString();
            document.getElementById('product-image').src = product.image;
            document.getElementById('product-image').alt = productName;
            
            // Create size options
            const sizeOptions = document.getElementById('size-options');
            product.sizes.forEach(size => {
                const sizeBtn = document.createElement('button');
                sizeBtn.textContent = size;
                sizeBtn.className = 'size-btn';
                sizeBtn.style.padding = '0.5rem 1rem';
                sizeBtn.style.border = '1px solid #ddd';
                sizeBtn.style.background = '#fff';
                sizeBtn.style.cursor = 'pointer';
                sizeBtn.style.transition = 'all 0.2s';
                sizeBtn.addEventListener('click', () => {
                    // Remove selected class from all
                    document.querySelectorAll('.size-btn').forEach(btn => {
                        btn.style.background = '#fff';
                        btn.style.color = '#000';
                    });
                    // Add selected class to clicked
                    sizeBtn.style.background = '#000';
                    sizeBtn.style.color = '#fff';
                    selectedSize = size;
                });
                sizeOptions.appendChild(sizeBtn);
            });
        } else {
            // Product not found
            document.querySelector('.product-detail').innerHTML = '<p>Producto no encontrado.</p>';
        }

        let selectedSize = null;

        // Add to cart button
        document.getElementById('add-to-cart-btn').addEventListener('click', () => {
            if (!selectedSize) {
                alert('Por favor selecciona un talle.');
                return;
            }
            const product = products[productName];
            cart.addProduct({ 
                id: slugify(productName + '-' + selectedSize), 
                name: productName + ' (' + selectedSize + ')', 
                price: product.price,
                size: selectedSize 
            });
        });

        // Newsletter form
        document.querySelector('.newsletter-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input').value;
            alert('¡Gracias por suscribirte! Recibirás nuestras novedades en ' + email);
            e.target.reset();
        });

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
