<!DOCTYPE html>
<!-- Payment page -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Seguro — NOIR | Completá tu Compra</title>
    <meta name="description" content="Completá tu compra en NOIR de forma segura. Aceptamos tarjetas de crédito y débito con cifrado SSL.">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav aria-label="Navegación principal">
            <div class="logo">
                <a href="../index.html" aria-label="Ir al inicio de NOIR">
                    <img src="../img/logo.png" alt="Logo de NOIR — Moda contemporánea">
                </a>
            </div>
            <button class="hamburger" aria-label="Abrir menú de navegación" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" role="list">
                <li><a href="products.html">Productos</a></li>
                <li><a href="lookbook.html">Lookbook</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon" title="Mi carrito" role="button" aria-label="Ver carrito de compras">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count" aria-label="Cantidad de artículos en el carrito"></span>
            </div>
        </nav>
    </header>

    <main class="payment-page" id="contenido-principal">
        <div class="payment-page__inner">
            <h1>Procesar Pago</h1>
            <p>Ingresá los detalles de tu método de pago para completar la compra.</p>

            <form id="payment-form" class="payment-form"
                  aria-label="Formulario de pago seguro" novalidate>

                <div class="form-group">
                    <label for="card-number">Número de Tarjeta</label>
                    <input type="text" id="card-number" name="card-number"
                           placeholder="1234 5678 9012 3456"
                           maxlength="19"
                           autocomplete="cc-number"
                           required>
                </div>

                <div class="form-group">
                    <label for="expiry">Fecha de Expiración</label>
                    <input type="text" id="expiry" name="expiry"
                           placeholder="MM/AA"
                           maxlength="5"
                           autocomplete="cc-exp"
                           required>
                </div>

                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv"
                           placeholder="123"
                           maxlength="4"
                           autocomplete="cc-csc"
                           required>
                </div>

                <button type="submit" id="pay-btn">Pagar Ahora</button>
            </form>
        </div>
    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="../js/cart.js"></script>
    <script>
        document.getElementById('payment-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            btn.textContent = 'Procesando...';

            setTimeout(() => {
                const cart = new ShoppingCart();
                cart.clearCart();
                window.location.href = 'confirmation.html';
            }, 2000);
        });

        // Hamburger
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', function () {
            const isOpen = navLinks.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', isOpen);
        });
    </script>

</body>

</html>
