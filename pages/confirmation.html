<!DOCTYPE html>
<!-- Payment confirmation page -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — NOIR | ¡Gracias por tu compra!</title>
    <meta name="description" content="Tu pago fue procesado exitosamente en NOIR. Recibirás un email de confirmación con los detalles de tu pedido.">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav aria-label="Navegación principal">
            <div class="logo">
                <a href="../index.html" aria-label="Ir al inicio de NOIR">
                    <img src="../img/logo.png" alt="Logo de NOIR — Moda contemporánea">
                </a>
            </div>
            <button class="hamburger" aria-label="Abrir menú de navegación" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" role="list">
                <li><a href="products.html">Productos</a></li>
                <li><a href="lookbook.html">Lookbook</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon" title="Mi carrito" role="button" aria-label="Ver carrito de compras">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count" aria-label="Cantidad de artículos en el carrito"></span>
            </div>
        </nav>
    </header>

    <main class="confirmation-page" id="contenido-principal">
        <div class="confirmation-page__inner" role="alert" aria-live="polite">
            <div class="checkmark" aria-hidden="true"></div>
            <h1>¡Pago Exitoso!</h1>
            <p>Tu pago ha sido procesado correctamente.</p>
            <p>Gracias por tu compra en <strong>Noir</strong>.</p>
            <a href="../index.html" class="btn-back-home">Volver al Inicio</a>
        </div>
    </main>

    <!-- ===== SCRIPTS ===== -->
    <script src="../js/cart.js"></script>
    <script>
        // Hamburger
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', function () {
            const isOpen = navLinks.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', isOpen);
        });
    </script>

</body>

</html>
