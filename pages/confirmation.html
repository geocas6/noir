<!DOCTYPE html>
<!-- Payment confirmation page -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pago</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .checkmark {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: checkmark 0.8s ease-in-out;
        }
        .checkmark::after {
            content: '✓';
            font-size: 50px;
            color: white;
            font-weight: bold;
        }
        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="../index.html" style="text-decoration: none; color: inherit;"><img src="../img/logo.png" alt="NOIR Logo" style="height: 55px; width: auto;"></a></div>
            <button class="hamburger" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="products.html">Productos</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count"></span>
            </div>
        </nav>
    </header>

    <main style="padding-top: 100px; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; max-width: 600px; padding: 2rem;">
            <div class="checkmark"></div>
            <h1 style="margin-bottom: 1rem; color: var(--primary-color);">¡Pago Exitoso!</h1>
            <p style="font-size: 1.2rem; color: var(--text-color);">Tu pago ha sido procesado correctamente.</p>
            <p style="margin-top: 1rem; color: var(--text-color);">Gracias por tu compra en Noir.</p>
            <a href="../index.html" style="display: inline-block; margin-top: 2rem; padding: 1rem 2rem; background: var(--primary-color); color: var(--secondary-color); text-decoration: none; border-radius: 4px; font-weight: 600;">Volver al Inicio</a>
        </div>
    </main>

    <script src="../js/cart.js"></script>
    <script>
        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
