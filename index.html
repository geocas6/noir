<!DOCTYPE html>
<!-- Página principal de NOIR -->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noir</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;"><img
                        src="img/logo.png" alt="NOIR Logo" style="height: 55px; width: auto;"></a></div>
            <button class="hamburger" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="pages/products.html">Productos</a></li>
                <li><a href="pages/contact.html">Contacto</a></li>
            </ul>
            <div class="cart-icon" title="Mi carrito">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span id="cart-count"></span>
            </div>
        </nav>
    </header>

    <!-- Hero section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Bienvenido a Noir.</h1>
            <p>Piezas exclusivas con diseño limpio y contemporáneo.</p>
            <a href="pages/products.html" class="cta-button">Explorar</a>
        </div>
    </section>

    <!-- Newsletter section -->
    <section class="newsletter">
        <h2>Suscríbete a Nuestro Newsletter</h2>
        <p style="margin-bottom: 1.5rem;">Recibe las últimas tendencias y ofertas exclusivas</p>
        <form class="newsletter-form">
            <input type="email" placeholder="Tu correo electrónico" required>
            <button type="submit">Suscribirse</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Síguenos</h3>
                <ul>
                    <li><a href="https://www.instagram.com/noirrr" target="_blank">Instagram</a></li>
                    <li><a href="https://twitter.com/noirr" target="_blank">X</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 NOIR. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/cart.js"></script>
    <script>
        // Newsletter functionality
        document.querySelector('.newsletter-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            // Simulate subscription
            this.querySelector('button').textContent = 'Suscribiendo...';
            this.querySelector('button').disabled = true;
            setTimeout(() => {
                // Show confirmation
                const notification = document.createElement('div');
                notification.className = 'noir-notification';
                notification.textContent = '¡Te has suscrito exitosamente al newsletter!';
                notification.style.cssText = 'position:fixed;top:140px;right:20px;background:#000;color:#fff;padding:0.9rem 1.2rem;border-radius:6px;z-index:4000;';
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 5000);
                // Reset form
                this.reset();
                this.querySelector('button').textContent = 'Suscribirse';
                this.querySelector('button').disabled = false;
            }, 1000);
        });

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', function () {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
    <!-- Fin del documento -->
</body>

</html>
